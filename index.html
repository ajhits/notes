<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat Notes</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ece5dd;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: #075e54;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.message {
    max-width: 70%;
    padding: 10px 15px;
    margin-bottom: 10px;
    border-radius: 15px;
    word-wrap: break-word;
}

.sent {
    align-self: flex-end;
    background: #dcf8c6;
}

.received {
    align-self: flex-start;
    background: white;
}

#inputArea {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
}

#noteInput {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    background: #075e54;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<header>Chat Notes</header>

<div id="chat"></div>

<div id="inputArea">
    <input type="text" id="noteInput" placeholder="Type a message...">
    <button onclick="addMessage()">Send</button>
</div>

<script>
const BIN_ID = "69a44c9c43b1c97be9a96b73";
const API_KEY = "$2a$10$YRjBGkyNTAV29L5US5KyluFaroMHSH1X0h1KP/2uBewIrkjRvzYBS";

async function getMessages() {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { "X-Master-Key": API_KEY }
    });
    const data = await res.json();
    return data.record.messages || [];
}

async function saveMessages(messages) {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "X-Master-Key": API_KEY
        },
        body: JSON.stringify({ messages: messages })
    });
}

function renderMessages(messages) {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    messages.forEach((msg, index) => {
        const div = document.createElement("div");
        div.className = "message " + (index % 2 === 0 ? "sent" : "received");
        div.textContent = msg;
        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}

async function addMessage() {
    const input = document.getElementById("noteInput");
    const text = input.value.trim();
    if (!text) return;

    let messages = await getMessages();

    if (messages.length >= 5) {
        messages.shift(); // remove oldest
    }

    messages.push(text);

    await saveMessages(messages);
    renderMessages(messages);

    input.value = "";
}

async function init() {
    const messages = await getMessages();
    renderMessages(messages);
}

init();
</script>

</body>
</html>
